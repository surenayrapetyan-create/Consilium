<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consilium — Фаза 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">Consilium</h1>
    <p class="text-zinc-400 mb-8">Фаза 1 • Диагностика API</p>

    <div id="form">
      <div class="mb-4">
        <label class="block text-sm mb-1">1. Что я уже думаю? <span class="text-red-500">*</span></label>
        <textarea id="thoughts" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-4"></textarea>
      </div>
      <button onclick="startStorm()" class="w-full bg-violet-600 hover:bg-violet-700 py-5 text-xl rounded-2xl">
        ЗАПУСТИТЬ ШТУРМ
      </button>
    </div>

    <div id="result" class="hidden mt-12">
      <h2 class="text-xl mb-4">Диагностика моделей</h2>
      <div id="synthesis" class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 text-sm whitespace-pre-wrap font-mono"></div>
    </div>
  </div>

  <script>
    async function startStorm() {
      const thoughts = document.getElementById('thoughts').value.trim();
      if (!thoughts) return alert('Заполни первое поле');

      const prompt = "Тестовый промпт Consilium";

      document.getElementById('form').classList.add('hidden');
      const resultDiv = document.getElementById('result');
      const output = document.getElementById('synthesis');
      resultDiv.classList.remove('hidden');

      output.innerHTML = "Проверяем модели...\n\n";

      const models = [
        {name: 'Claude', url: '/api/claude'},
        {name: 'GPT',    url: '/api/openai'},
        {name: 'Gemini', url: '/api/gemini'}
      ];

      for (let m of models) {
        try {
          const res = await fetch(m.url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt})
          });
          if (res.ok) {
            output.innerHTML += `✅ ${m.name} — успешно\n`;
          } else {
            output.innerHTML += `❌ ${m.name} — ошибка ${res.status}\n`;
          }
        } catch (e) {
          output.innerHTML += `❌ ${m.name} — не удалось подключиться\n`;
        }
      }
    }
  </script>
</body>
</html>
