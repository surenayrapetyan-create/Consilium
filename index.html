<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Consilium</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .modes { display: flex; gap: 10px; margin-bottom: 20px; }
    .modes button { padding: 8px 20px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; }
    .modes button.active { background: #333; color: #fff; border-color: #333; }
    textarea { width: 100%; height: 80px; padding: 10px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 10px 24px; font-size: 14px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 6px; }
    .card h2 { font-size: 14px; margin: 0 0 10px; color: #333; }
    .card p { font-size: 14px; color: #444; white-space: pre-wrap; min-height: 60px; }
    .arbitr { border: 2px solid #333; padding: 20px; border-radius: 6px; margin-top: 24px; }
    .arbitr h2 { font-size: 16px; margin: 0 0 12px; }
    .arbitr p { font-size: 14px; color: #444; white-space: pre-wrap; min-height: 40px; }
    .loading { color: #999; }
  </style>
</head>
<body>
  <h1>Consilium</h1>

  <div class="modes">
    <button class="active" onclick="setMode('panel', this)">Панель</button>
    <button onclick="setMode('analysis', this)">Анализ</button>
    <button onclick="setMode('debate', this)">Дебаты</button>
  </div>

  <textarea id="prompt" placeholder="Введи вопрос..."></textarea>
  <button onclick="ask()">Спросить</button>

  <div class="grid">
    <div class="card">
      <h2>Claude</h2>
      <p id="claude-out">—</p>
    </div>
    <div class="card">
      <h2>GPT-4o</h2>
      <p id="openai-out">—</p>
    </div>
    <div class="card">
      <h2>Gemini</h2>
      <p id="gemini-out">—</p>
    </div>
  </div>

  <div class="arbitr">
    <h2>Арбитр</h2>
    <p id="arbitr-out">—</p>
  </div>

  <script>
    let currentMode = 'panel';

    function setMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function ask() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      ['claude', 'openai', 'gemini', 'arbitr'].forEach(m => {
        document.getElementById(m + '-out').textContent = 'Загрузка...';
        document.getElementById(m + '-out').className = 'loading';
      });

      const call = async (model) => {
        const res = await fetch(`/api/${model}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        document.getElementById(model + '-out').textContent = data.text;
        document.getElementById(model + '-out').className = '';
        return data.text;
      };

      const [claude, openai, gemini] = await Promise.all([
        call('claude'),
        call('openai'),
        call('gemini')
      ]);

      const res = await fetch('/api/chairman', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, claude, openai, gemini, mode: currentMode })
      });
      const data = await res.json();
      document.getElementById('arbitr-out').textContent = data.text;
      document.getElementById('arbitr-out').className = '';
    }
  </script>
</body>
</html>
