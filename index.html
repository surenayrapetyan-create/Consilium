<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consilium — Фаза 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-zinc-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-8">
    <div class="flex items-center gap-3 mb-10">
      <h1 class="text-4xl font-semibold tracking-tighter">Consilium</h1>
      <span class="px-3 py-1 text-xs font-medium bg-violet-500/10 text-violet-400 rounded-3xl">Фаза 1</span>
    </div>

    <div id="form" class="space-y-8">
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">1. Что я уже думаю про этот вопрос? <span class="text-red-500">*</span></label>
        <textarea id="thoughts" rows="4" class="w-full bg-zinc-900 border border-zinc-700 focus:border-violet-500 rounded-3xl p-5 text-lg resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">2. Контекст ситуации</label>
        <textarea id="context" rows="3" class="w-full bg-zinc-900 border border-zinc-700 focus:border-violet-500 rounded-3xl p-5 text-lg resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">3. Что произойдёт, если решу неправильно?</label>
        <textarea id="consequences" rows="2" class="w-full bg-zinc-900 border border-zinc-700 focus:border-violet-500 rounded-3xl p-5 text-lg resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">4. Конкретный вопрос</label>
        <textarea id="question" rows="2" class="w-full bg-zinc-900 border border-zinc-700 focus:border-violet-500 rounded-3xl p-5 text-lg resize-none"></textarea>
      </div>

      <!-- Выбор моделей -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <p class="text-sm font-medium text-zinc-400 mb-4">Модели в штурме:</p>
        <div class="flex flex-wrap gap-x-8 gap-y-3">
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="claude" checked class="w-4 h-4 accent-violet-500"> Claude Opus 4.7</label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="gpt" checked class="w-4 h-4 accent-violet-500"> GPT-4o</label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="gemini" class="w-4 h-4 accent-violet-500"> Gemini 3.1 Pro</label>
        </div>
      </div>

      <button onclick="startStorm()" class="w-full bg-violet-600 hover:bg-violet-700 py-6 text-xl font-semibold rounded-3xl flex items-center justify-center gap-3 transition-all">
        <i class="fas fa-rocket"></i> ЗАПУСТИТЬ ШТУРМ
      </button>
    </div>

    <!-- Результат -->
    <div id="result" class="hidden mt-12">
      <h2 class="text-2xl font-semibold mb-6">Штурм запущен...</h2>
      
      <div id="progress" class="space-y-4 mb-8"></div>
      
      <div id="experts" class="hidden space-y-6 mb-10"></div>
      
      <div id="synthesis" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 leading-relaxed text-zinc-200 min-h-[420px] whitespace-pre-wrap"></div>

      <button onclick="resetForm()" class="mt-8 flex items-center gap-2 text-zinc-400 hover:text-white">
        <i class="fas fa-arrow-left"></i> Новый штурм
      </button>
    </div>
  </div>

  <script>
    async function startStorm() {
      const thoughts = document.getElementById('thoughts').value.trim();
      if (!thoughts) return alert('Заполни обязательное поле «Что я уже думаю»');

      const userInput = {
        thoughts,
        context: document.getElementById('context').value.trim(),
        consequences: document.getElementById('consequences').value.trim(),
        question: document.getElementById('question').value.trim()
      };

      // Выбранные модели
      const models = [];
      if (document.getElementById('claude').checked) models.push({name: 'Claude', url: '/api/claude'});
      if (document.getElementById('gpt').checked) models.push({name: 'GPT-4o', url: '/api/openai'});
      if (document.getElementById('gemini').checked) models.push({name: 'Gemini 3.1 Pro', url: '/api/gemini'});

      if (models.length < 2) return alert('Выбери минимум 2 модели');

      // Показ результата
      document.getElementById('form').classList.add('hidden');
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('hidden');

      const progressDiv = document.getElementById('progress');
      const expertsDiv = document.getElementById('experts');
      const synthesisDiv = document.getElementById('synthesis');

      progressDiv.innerHTML = '';
      expertsDiv.classList.add('hidden');
      synthesisDiv.innerHTML = '';

      let responses = [];
      let failed = [];

      // Прогресс
      for (let i = 0; i < models.length; i++) {
        const model = models[i];
        const progress = Math.round(((i) / models.length) * 100);

        const item = document.createElement('div');
        item.className = "flex items-center gap-3 bg-zinc-900 border border-zinc-700 rounded-2xl p-4";
        item.innerHTML = `<i class="fas fa-spinner fa-spin text-violet-500"></i><span class="font-medium">${model.name}</span><span class="text-zinc-500 text-sm ml-auto">${progress}%</span>`;
        progressDiv.appendChild(item);

        try {
          const res = await fetch(model.url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: buildExpertPrompt(userInput)})
          });

          if (res.ok) {
            const data = await res.json();
            responses.push({name: model.name, text: data.text});
            item.innerHTML = `<i class="fas fa-check text-green-500"></i><span class="font-medium">${model.name}</span><span class="text-green-400 ml-auto">100%</span>`;
          } else throw new Error();
        } catch {
          failed.push(model.name);
          item.innerHTML = `<i class="fas fa-xmark text-red-500"></i><span class="font-medium">${model.name}</span><span class="text-red-400 ml-auto">ошибка</span>`;
        }
      }

      // Показываем ответы моделей
      expertsDiv.classList.remove('hidden');
      expertsDiv.innerHTML = `<h3 class="text-lg font-medium mb-4 text-zinc-400">Ход рассуждений моделей:</h3>`;

      responses.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = "bg-zinc-950 border border-zinc-700 rounded-3xl p-6";
        div.innerHTML = `
          <div class="font-medium mb-3">Эксперт ${String.fromCharCode(65 + i)} — ${r.name}</div>
          <div class="text-zinc-300 leading-relaxed text-[15px] max-h-96 overflow-auto">${r.text.replace(/\n/g, '<br>')}</div>
        `;
        expertsDiv.appendChild(div);
      });

      // Арбитр
      synthesisDiv.innerHTML = '<p class="text-violet-400">Арбитр формирует карту согласия/расхождений...</p>';

      const labels = responses.map((_, i) => String.fromCharCode(65 + i));
      const shuffled = responses.sort(() => Math.random() - 0.5).map((r, i) => ({label: labels[i], text: r.text}));
      const expertResponses = {};
      shuffled.forEach(r => expertResponses[r.label] = r.text);

      const chairmanRes = await fetch('/api/chairman', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({userInput, expertResponses, failedModels: failed})
      });

      const final = await chairmanRes.json();
      synthesisDiv.innerHTML = final.synthesis.replace(/\n/g, '<br>');
    }

    function buildExpertPrompt(userInput) {
      return `Ты — один из независимых экспертов в Консилиуме.

**Что я уже думаю:** ${userInput.thoughts}
**Контекст:** ${userInput.context}
**Что произойдёт при ошибке:** ${userInput.consequences}
**Вопрос:** ${userInput.question}

Думай шаг за шагом и покажи полный ход рассуждений.`;
    }

    function resetForm() {
      document.getElementById('form').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
    }
  </script>
</body>
</html>
