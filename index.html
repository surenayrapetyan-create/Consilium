<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consilium — Фаза 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-2">Consilium</h1>
    <p class="text-zinc-400 mb-8">Штурм важных вопросов • Фаза 1</p>

    <div id="form" class="space-y-8">
      <!-- поля формы (те же) -->
      <div>
        <label class="block text-sm font-medium mb-2">1. Что я уже думаю про этот вопрос? <span class="text-red-500">*</span></label>
        <textarea id="thoughts" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-violet-500 resize-none" placeholder="Обязательное поле..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">2. Контекст ситуации</label>
        <textarea id="context" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-violet-500 resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">3. Что произойдёт, если решу неправильно?</label>
        <textarea id="consequences" rows="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-violet-500 resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">4. Конкретный вопрос</label>
        <textarea id="question" rows="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-violet-500 resize-none"></textarea>
      </div>

      <button onclick="startStorm()" class="w-full bg-violet-600 hover:bg-violet-700 py-6 text-xl font-semibold rounded-3xl flex items-center justify-center gap-3">
        <i class="fas fa-rocket"></i>
        ЗАПУСТИТЬ ШТУРМ
      </button>
    </div>

    <div id="result" class="hidden mt-12">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold">Результат</h2>
      </div>
      <div id="synthesis" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 min-h-[400px] whitespace-pre-wrap text-zinc-200"></div>
    </div>
  </div>

  <script>
    async function startStorm() {
      const thoughts = document.getElementById('thoughts').value.trim();
      if (!thoughts) return alert('Заполни обязательное поле «Что я уже думаю»');

      const userInput = {
        thoughts,
        context: document.getElementById('context').value.trim(),
        consequences: document.getElementById('consequences').value.trim(),
        question: document.getElementById('question').value.trim()
      };

      document.getElementById('form').classList.add('hidden');
      const synthesisDiv = document.getElementById('synthesis');
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('hidden');

      synthesisDiv.innerHTML = `<p class="text-violet-400">Запускаем экспертов...</p>`;

      const expertPrompt = `Ты — один из трёх независимых экспертов...` + // (полный промпт как раньше, я сократил для экономии места)
        `\n\n**Что я уже думаю:** ${userInput.thoughts}\n**Контекст:** ${userInput.context}\n**Последствия:** ${userInput.consequences}\n**Вопрос:** ${userInput.question}`;

      const calls = [
        { name: 'Claude', url: '/api/claude' },
        { name: 'GPT',    url: '/api/openai' },
        { name: 'Gemini', url: '/api/gemini' }
      ];

      let responses = [];
      let errors = [];

      for (const call of calls) {
        try {
          const res = await fetch(call.url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: expertPrompt })
          });

          if (res.ok) {
            const data = await res.json();
            responses.push({ model: call.name, text: data.text || 'Ответ получен' });
          } else {
            const errText = await res.text();
            errors.push(`${call.name}: ${res.status} ${errText.substring(0, 200)}`);
          }
        } catch (e) {
          errors.push(`${call.name}: Network error — ${e.message}`);
        }
      }

      synthesisDiv.innerHTML = `
        <div class="mb-6">
          <p class="text-green-400">✅ Успешно: ${responses.length} из 3</p>
          ${errors.length ? `<p class="text-red-400 mt-2">❌ Ошибки:<br>${errors.join('<br>')}</p>` : ''}
        </div>
      `;

      if (responses.length < 2) {
        synthesisDiv.innerHTML += `<p class="text-red-400 mt-8">Не удалось запустить арбитр (меньше 2 ответов). Исправь ошибки выше и попробуй снова.</p>`;
        return;
      }

      // Анонимизация и вызов арбитра (как раньше)
      const labels = ['A','B','C'];
      const shuffled = responses.sort(() => Math.random()-0.5).map((r,i) => ({label: labels[i], text: r.text}));
      const expertResponses = {};
      shuffled.forEach(r => expertResponses[r.label] = r.text);

      const chairmanRes = await fetch('/api/chairman', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userInput, expertResponses, failedModels: errors })
      });

      const final = await chairmanRes.json();
      synthesisDiv.innerHTML += `<div class="mt-8 border-t border-zinc-700 pt-8">${final.synthesis.replace(/\n/g, '<br>')}</div>`;
    }
  </script>
</body>
</html>
