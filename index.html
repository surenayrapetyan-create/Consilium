<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consilium — Фаза 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-[#0f0f0f] text-zinc-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-8">
    <div class="flex items-center gap-3 mb-8">
      <h1 class="text-4xl font-semibold">Consilium</h1>
      <span class="px-3 py-1 text-xs bg-violet-500/10 text-violet-400 rounded-full">Фаза 1</span>
    </div>

    <div id="form" class="space-y-8">
      <!-- 4 поля (те же) -->
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">1. Что я уже думаю? <span class="text-red-500">*</span></label>
        <textarea id="thoughts" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-5 text-lg focus:outline-none focus:border-violet-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">2. Контекст</label>
        <textarea id="context" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-5 text-lg focus:outline-none focus:border-violet-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">3. Что будет при ошибке?</label>
        <textarea id="consequences" rows="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-5 text-lg focus:outline-none focus:border-violet-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2 text-zinc-400">4. Конкретный вопрос</label>
        <textarea id="question" rows="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-5 text-lg focus:outline-none focus:border-violet-500"></textarea>
      </div>

      <button onclick="startStorm()" class="w-full bg-violet-600 hover:bg-violet-700 py-6 text-xl font-semibold rounded-3xl flex items-center justify-center gap-3">
        <i class="fas fa-rocket"></i>
        ЗАПУСТИТЬ ШТУРМ
      </button>
    </div>

    <div id="result" class="hidden mt-12">
      <div class="mb-6">
        <h2 class="text-2xl font-semibold mb-4">Штурм в процессе...</h2>
        <div id="progress" class="space-y-3"></div>
      </div>
      <div id="synthesis" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 leading-relaxed text-zinc-200 min-h-[400px] whitespace-pre-wrap"></div>
    </div>
  </div>

  <script>
    // ... (полный код с прогрессом и Enter — я могу дать его полностью, если нужно)

    // Для экономии места скажи «index.html готов» после обновления api-файлов — я сразу дам полный красивый index.html с прогресс-баром.
  </script>
</body>
</html>
